<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erebor — Open Intelligence Graph</title>
  <meta name="description" content="Palantir-grade investigation workspace built entirely on open data. Repos, papers, geography — one graph.">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/shell.css">
  <link rel="stylesheet" href="css/omnibar.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/canvas.css">
  <link rel="stylesheet" href="css/inspector.css">
  <link rel="stylesheet" href="css/timeline.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.170.0",
      "three/addons/": "https://esm.sh/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script>window.EREBOR_DIRECT_OSS=true;</script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <span class="brand-name">EREBOR</span>
      </div>
      <div class="header-sources" id="source-chips"></div>
      <div class="header-actions">
        <span class="badge live">Live OSS feeds</span>
        <button class="btn-ghost" id="btn-reset-view" type="button">Reset view</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="panel panel-left">
        <div class="panel-head">Investigate</div>
        <div class="omnibar-wrap">
          <form class="omnibar" id="search-form">
            <span class="omnibar-icon" aria-hidden="true">⌕</span>
            <input id="search-input" type="search" placeholder="Search repos, papers, places…" autocomplete="off" spellcheck="false">
            <kbd>↵</kbd>
          </form>
        </div>
        <div class="panel-body">
          <div id="search-results" class="search-results"></div>
          <div class="panel-head" style="border:none;padding-left:0;margin-top:8px">Graph entities</div>
          <div id="entity-list" class="entity-list"></div>
        </div>
      </aside>

      <section class="canvas-wrap">
        <canvas id="erebor-canvas"></canvas>
        <div class="canvas-overlay">
          <div class="canvas-hud">
            <div class="hud-card">
              <div class="hud-label">Nodes linked</div>
              <div class="hud-value" id="hud-nodes">—</div>
            </div>
            <div class="hud-card">
              <div class="hud-label">Active source</div>
              <div class="hud-value" id="hud-source" style="font-size:13px">multi</div>
            </div>
          </div>
          <div class="canvas-controls">
            <button class="ctrl-btn active" id="btn-rotate" type="button" title="Auto rotate">↻</button>
            <button class="ctrl-btn" id="btn-arcs" type="button" title="Toggle arcs">⌇</button>
          </div>
        </div>
        <div class="loading-veil" id="loading-veil"><div class="spinner"></div></div>
      </section>

      <aside class="panel panel-right">
        <div class="panel-head">Entity inspector</div>
        <div class="panel-body" id="inspector">
          <div class="inspector-empty">
            <p>Select a node or search result to inspect open-source intelligence.</p>
          </div>
        </div>
      </aside>
    </main>

    <footer class="timeline-bar">
      <div class="timeline-head">
        <span class="mono dim">Investigation trail</span>
        <span class="badge" id="trail-count">0 events</span>
      </div>
      <div class="timeline-track" id="timeline-track"></div>
    </footer>
  </div>

  <script type="module" src="js/scene.js?v=1782696564"></script>
  <script type="module" src="js/app.js?v=1782696564"></script>
</body>
</html>
